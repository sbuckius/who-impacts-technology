<style>
:root{
  --bg:#1a0810;--surface:#250d18;--surface2:#301222;--surface3:#3d1630;
  --border:#5a1f3a;--border2:#7a2b50;
  --accent:#ff6eb4;--accent2:#ff3d7f;--accent3:#c0176a;
  --yes:#ff6eb4;--yes2:#ffb3d9;--no:#8b1a3a;--no2:#c0395e;
  --neu:#b06090;--neu2:#d4a0c0;
  --text:#fce8f0;--muted:#a06080;--muted2:#d48aaa;
  --radius:14px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;padding:2rem;
  background:radial-gradient(ellipse 60% 50% at 25% 15%,rgba(255,110,180,.13) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 75% 85%,rgba(139,26,58,.18) 0%,transparent 70%),var(--bg);
}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:3rem 3.5rem;width:100%;max-width:440px;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.logo{font-family:var(--fh);font-size:2.4rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.25rem}
.logo span{color:var(--accent)}
.login-sub{color:var(--muted2);font-size:.9rem;margin-bottom:2.5rem}
.field-label{display:block;text-align:left;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem}
input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;color:var(--text);font-family:var(--fb);font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:1.5rem}
input[type=text]:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#1a0810;border:none;border-radius:10px;padding:.9rem 1.5rem;font-family:var(--fh);font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.01em;transition:transform .15s,box-shadow .15s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,110,180,.35)}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100vh}

/* ── HEADER ── */
.app-header{position:sticky;top:0;z-index:200;background:rgba(26,8,16,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.8rem 1.75rem;display:flex;align-items:center;gap:.9rem;flex-shrink:0}
.header-logo{font-family:var(--fh);font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-right:auto}
.header-logo span{color:var(--accent)}
.live-pill{display:flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:700;color:var(--accent);letter-spacing:.07em;text-transform:uppercase;background:rgba(255,110,180,.1);border:1px solid rgba(255,110,180,.28);border-radius:100px;padding:.28rem .75rem}
.live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.btn-pdf{display:flex;align-items:center;gap:.45rem;background:linear-gradient(135deg,#8b1a3a,#ff3d7f);color:#fff;border:none;border-radius:8px;padding:.48rem .95rem;font-family:var(--fh);font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:opacity .15s,transform .15s;flex-shrink:0;white-space:nowrap}
.btn-pdf:hover{opacity:.9;transform:translateY(-1px)}
.btn-pdf:disabled{opacity:.4;cursor:not-allowed;transform:none}
.user-badge{display:flex;align-items:center;gap:.45rem;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:.32rem .85rem .32rem .38rem;font-size:.82rem;flex-shrink:0}
.user-avatar{width:25px;height:25px;border-radius:50%;background:linear-gradient(135deg,#ff6eb4,#8b1a3a);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fce8f0;flex-shrink:0}

/* ── LAYOUT ── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:228px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:1.1rem 0}
.sidebar-label{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 1.1rem;margin-bottom:.3rem;margin-top:.6rem}
.sbtn{display:flex;align-items:center;gap:.55rem;width:100%;padding:.58rem 1.1rem;background:transparent;border:none;color:var(--muted2);font-family:var(--fb);font-size:.83rem;text-align:left;cursor:pointer;position:relative;transition:background .15s,color .15s}
.sbtn:hover{background:var(--surface2);color:var(--text)}
.sbtn.theme-active{background:rgba(255,110,180,.1);color:var(--accent)}
.sbtn.theme-active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.sbtn.sum-active{background:rgba(139,26,58,.2);color:#ff9fcc}
.sbtn.sum-active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:#c0395e;border-radius:0 3px 3px 0}
.si{font-size:1rem;flex-shrink:0}.sn{flex:1;font-weight:500;line-height:1.3}
.sp{font-size:.66rem;background:var(--surface3);border-radius:100px;padding:.1rem .38rem;color:var(--muted);flex-shrink:0}

/* ── MAIN ── */
.main-content{flex:1;overflow-y:auto;padding:2rem 2.5rem}

/* ── CONFIG NOTICE ── */
.cfg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:.9rem 1.1rem;font-size:.83rem;color:#fca5a5;margin-bottom:1.5rem;display:none}
.cfg.show{display:block}
.cfg code{background:rgba(0,0,0,.3);padding:.1rem .32rem;border-radius:4px;font-size:.75rem}

/* ── PAGE HEADERS ── */
.pg-icon{font-size:2.1rem;margin-bottom:.35rem}
.pg-title{font-family:var(--fh);font-size:1.85rem;font-weight:800;letter-spacing:-.035em}
.pg-sub{color:var(--muted2);font-size:.87rem;margin-top:.2rem;margin-bottom:1.85rem}
.pg-sub strong{color:#ff6eb4}

/* ── OVERALL CARD ── */
.overall-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem 1.9rem;margin-bottom:2rem}
.oc-title{font-family:var(--fh);font-size:1.05rem;font-weight:700;margin-bottom:.2rem}
.oc-sub{font-size:.81rem;color:var(--muted2);margin-bottom:1.3rem}
.oc-stats{display:flex;gap:1.2rem;margin-bottom:1.3rem;flex-wrap:wrap}
.ostat{text-align:center;min-width:74px}
.ostat-num{font-family:var(--fh);font-size:1.8rem;font-weight:800;line-height:1}
.ostat-num.y{color:#ff6eb4}.ostat-num.n{color:#c0395e}.ostat-num.neu{color:#b06090}.ostat-num.t{color:#ff9fcc}.ostat-num.r{color:#ffb3d9}
.ostat-lbl{font-size:.68rem;color:var(--muted);margin-top:.15rem}
.chart-h240{height:240px;position:relative}

/* ── THEME SUMMARY SECTIONS ── */
.tss{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.6rem;margin-bottom:1.1rem}
.tss-hd{display:flex;align-items:center;gap:.55rem;margin-bottom:1.1rem}
.tss-ico{font-size:1.2rem}.tss-nm{font-family:var(--fh);font-size:.97rem;font-weight:700}
.tss-tot{font-size:.72rem;color:var(--muted);margin-left:auto;background:var(--surface2);padding:.12rem .45rem;border-radius:6px}
.chart-h130{height:130px;position:relative}

/* ── QUESTION CARDS ── */
.qgrid{display:flex;flex-direction:column;gap:1.1rem}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.5rem;transition:border-color .2s}
.qcard:hover{border-color:var(--border2)}
.qcard-img{width:100%;max-height:220px;object-fit:cover;border-radius:9px;margin-bottom:1rem;display:block}
.qcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.9rem;margin-bottom:.95rem}
.qtext{font-size:.93rem;font-weight:500;line-height:1.5;flex:1}
.qnum{font-family:var(--fh);font-size:.66rem;font-weight:700;color:var(--muted);background:var(--surface2);border-radius:6px;padding:.16rem .4rem;flex-shrink:0;margin-top:2px}

/* Vote buttons — 3 options */
.vbtns{display:flex;gap:.5rem;margin-bottom:.95rem}
.vbtn{flex:1;padding:.52rem .3rem;border-radius:8px;border:1.5px solid transparent;font-family:var(--fh);font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:all .15s;text-align:center;line-height:1.2}
.vbtn.yb{background:rgba(255,110,180,.08);border-color:rgba(255,110,180,.3);color:#ff6eb4}
.vbtn.yb:hover{background:rgba(255,110,180,.18);border-color:#ff6eb4}
.vbtn.yb.voted{background:#ff6eb4;color:#1a0810;border-color:#ff6eb4}
.vbtn.nb{background:rgba(139,26,58,.12);border-color:rgba(139,26,58,.4);color:#e05080}
.vbtn.nb:hover{background:rgba(139,26,58,.22);border-color:#c0395e}
.vbtn.nb.voted{background:#8b1a3a;color:#fce8f0;border-color:#8b1a3a}
.vbtn.neub{background:rgba(176,96,144,.08);border-color:rgba(176,96,144,.3);color:#b06090}
.vbtn.neub:hover{background:rgba(176,96,144,.18);border-color:#b06090}
.vbtn.neub.voted{background:#6b3050;color:#fce8f0;border-color:#6b3050}

/* Bar chart */
.bar-area{display:flex;flex-direction:column;gap:.4rem}
.brow{display:flex;align-items:center;gap:.5rem;font-size:.74rem;font-weight:600}
.blbl{width:38px;text-align:right;flex-shrink:0;font-size:.68rem}
.blbl.y{color:#ff6eb4}.blbl.n{color:#c0395e}.blbl.neu{color:#b06090}
.btrack{flex:1;height:10px;background:var(--surface2);border-radius:100px;overflow:hidden}
.bfill{height:100%;border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bfill.y{background:linear-gradient(90deg,#c0176a,#ff6eb4)}
.bfill.n{background:linear-gradient(90deg,#4a0a1e,#8b1a3a)}
.bfill.neu{background:linear-gradient(90deg,#4a1830,#b06090)}
.bcnt{width:26px;font-size:.7rem;color:var(--muted);flex-shrink:0}
.qtot{font-size:.68rem;color:var(--muted);margin-top:.1rem}

/* ── PDF OVERLAY ── */
#pdf-ov{display:none;position:fixed;inset:0;z-index:9999;background:rgba(26,8,16,.9);backdrop-filter:blur(6px);align-items:center;justify-content:center;flex-direction:column;gap:1.1rem}
#pdf-ov.show{display:flex}
.pdf-spin{width:46px;height:46px;border:3px solid var(--border2);border-top-color:#ff6eb4;border-radius:50%;animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pdf-msg{font-family:var(--fh);font-size:.97rem;font-weight:600}

/* ── TOAST ── */
#toast{position:fixed;bottom:1.7rem;right:1.7rem;z-index:9000;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:.65rem 1.1rem;font-size:.83rem;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

@media(max-width:900px){.sidebar{width:60px}.sn,.sp{display:none}.main-content{padding:1.25rem 1rem}}
@media(max-width:580px){.btn-pdf .label{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">CARE<span>tech</span></div>
    <p class="login-sub">Survey to gather inclusive data for caring technology</p>
    <label class="field-label" for="uname">Your display name</label>
    <input type="text" id="uname" placeholder="e.g. Alex, Team B, Anonymous…" maxlength="30" autocomplete="off">
    <button class="btn-primary" onclick="enterApp()">Join Survey →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="header-logo">CARE<span>tech</span></div>
    <div class="live-pill"><div class="live-dot"></div>Live</div>
    <button class="btn-pdf" id="pdf-btn" onclick="exportPDF()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="label">Save PDF Report</span>
    </button>
    <div class="user-badge">
      <div class="user-avatar" id="u-init">?</div>
      <span id="u-name">—</span>
    </div>
  </header>
  <div class="app-body">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content" id="main-content"></main>
  </div>
</div>

<div id="pdf-ov"><div class="pdf-spin"></div><div class="pdf-msg" id="pdf-msg">Building PDF…</div></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  SURVEY DATA
//  Each question can be either:
//    "Question text as a plain string"          ← no image
//    { text: "Question text", image: "images/inventors01.png" }  ← with image
//
//  Image naming convention: images/THEMESLUG##.png
//  e.g. images/inventors01.png, images/researchers02.png
// ═══════════════════════════════════════════════════════════════
const SURVEY = [
  {
    theme: "Inventors", icon: "💡", slug: "inventors",
    questions: [
      { text: "Do you tinker and create ideas for this type of technology?", image: "images/inventors01.png" },
      { text: "Do you have ideas that get past the idea phase for this type of technology?", image: "images/inventors02.png" },
      { text: "Can you afford to patent an idea for this technology if it costs $10,000 for the average patent?", image: "images/inventors03.png" },
      { text: "Do you have a patent for this type of technology?", image: "images/inventors04.png" },
      { text: "Have you invented a part of this technology?", image: "images/inventors05.png" },
      { text: "Do you get to design ideas for this type of technology that might be produced and deployed?", image: "images/inventors06.png" }
    ]
  },
  {
    theme: "Researchers", icon: "🔬", slug: "researchers",
    questions: [
      { text: "Do you have access to research money for this area of technology?", image: "images/researchers01.png" },
      { text: "Do you have access to equipment to research this area of technology?", image: "images/researchers02.png" },
      { text: "Do you have access to space to research this area of technology?", image: "images/researchers03.png" },
      { text: "Do you conduct research on this type of technology?", image: "images/researchers04.png" },
      { text: "Do you have access to other people's research about this technology?", image: "images/researchers05.png" }
    ]
  },
  {
    theme: "Designers", icon: "✏️", slug: "designers",
    questions: [
      { text: "Do you get to design ideas for this type of technology?", image: "images/designers01.png" },
      { text: "Do you have the computer programs to design ideas for this type of technology?", image: "images/designers02.png" },
      { text: "Do you have a computer that can run computer programs to design ideas for this type of technology?", image: "images/designers03.png" },
      { text: "Do your design ideas for this type of technology get developed and produced?", image: "images/designers04.png" },
      { text: "Do your design ideas for this type of technology get patented?", image: "images/designers05.png" }
    ]
  },
  {
    theme: "Manufacturers", icon: "🏭", slug: "manufacturers",
    questions: [
      { text: "Do you manufacture this type of technology?", image: "images/manufacturers01.png" },
      { text: "If you manufacture this type of technology, are your working conditions safe?", image: "images/manufacturers02.png" },
      { text: "If you manufacture this type of technology, do you feel that your pay is fair?", image: "images/manufacturers03.png" },
      { text: "If you manufacture this type of technology, do you find your working conditions to be supportive?", image: "images/manufacturers04.png" },
      { text: "Are you in any way a part of manufacturing this technology?", image: "images/manufacturers05.png" }
    ]
  },
  {
    theme: "Users", icon: "👤", slug: "users",
    questions: [
      { text: "Do you have access to this technology where you live?", image: "images/users01.png" },
      { text: "Can you afford this technology as much as you need it?", image: "images/users02.png" },
      { text: "Do you have access to service of this technology if it breaks?", image: "images/users03.png" },
      { text: "Are your needs met by this technology?", image: "images/users04.png" },
      { text: "Is this technology easy for you to use?", image: "images/users05.png" },
      { text: "Is this technology understandable to you, given your language?", image: "images/users06.png" },
      { text: "Is this technology the right size for you?", image: "images/users07.png" },
      { text: "Does this technology work most of the time for you when you use it?", image: "images/users08.png" },
      { text: "Does this technology fit into your culture?", image: "images/users09.png" },
      { text: "Does this technology fit into your everyday life?", image: "images/users10.png" },
  { text: "Does this technology improve your life?", image: "images/users11.png" },
  { text: "Does this technology allow you to spend more time on leisure activities or creative pursuits?", image: "images/users12.png" },
{ text: "Is this statement true: I want to own this technology AND I can own it.", image: "images/users13.png" },
  { text: "Does this technology help you with tasks that you do not like to do?", image: "images/users14.png" },
 { text: "Does this technology support you so you can spend more time on fun parts of your job?", image: "images/users15.png" },
 { text: "Does this technology help you with tasks that are dangerous for you or humans?", image: "images/users16.png" },
 { text: "Does this technology help you with tasks that are boring for you or humans?", image: "images/users17.png" },
 { text: "Does this technology make your job easier?", image: "images/users18.png" },
 { text: "Does this technology support you emotionally?", image: "images/users19.png" },
 { text: "Does this technology support you socially?", image: "images/users20.png" },
 { text: "Does this technology help you with domestic work?", image: "images/users21.png" },
 { text: "Does this technology help you with caregiving?", image: "images/users22.png" }
    ]
  },
  {
    theme: "News Images", icon: "📰", slug: "newsimages",
    questions: [
      { text: "Is the person pictured in the image someone other than a white man?", image: "images/newsimages01.png" },
      { text: "Is the person pictured in the image designing the technology?", image: "images/newsimages02.png" },
      { text: "Is the person pictured in the image working with the technology?", image: "images/newsimages03.png" },
      { text: "Is the person pictured in the image doing work that could be considered paid work outside the home?", image: "images/newsimages04.png" },
      { text: "Is the person pictured in the image looking competent with the technology?", image: "images/newsimages05.png" },
      { text: "Is the person pictured in the image looking at the technology instead of the camera?", image: "images/newsimages06.png" },
      { text: "Is this true: The person in the image is not smiling at the camera?", image: "images/newsimages07.png" },
      { text: "Is this true: The person in the image does not look objectified (like they are presenting the technology instead of working with it)?", image: "images/newsimages08.png" },
      { text: "Is this true: The person in the image looks like they are working with the technology instead of just standing by it?", image: "images/newsimages09.png" }
    ]
  },
  {
    theme: "Advertising & Marketing Images", icon: "📢", slug: "advertising",
    questions: [
      { text: "Does the image show at least one person other than a white man using the technology?", image: "images/advertising01.png" },
      { text: "Does the image show at least one person other than a white man designing the technology?", image: "images/advertising02.png" },
      { text: "If there is a person other than a white man in the ad, is this person not objectified or sexualized? (If they are objectified or sexualized, answer No)", image: "images/advertising03.png" }
    ]
  },
  {
    theme: "Company Ownership", icon: "🏢", slug: "ownership",
    questions: [
      { text: "Do you own a company that makes or sells this technology?", image: "images/ownership01.png" },
      { text: "Do you feel that the person who owns this company reflects your interests?", image: "images/ownership02.png" },
      { text: "Do you feel that the person who owns this company reflects your needs?", image: "images/ownership03.png" }
    ]
  },
  {
    theme: "Environmental Impact", icon: "🌍", slug: "environmental",
    questions: [
      { text: "Do you have the ability to influence the environmental impact of this technology?", image: "images/environmental01.png" },
      { text: "Do you live far from a manufacturing plant that makes this technology?", image: "images/environmental02.png" },
      { text: "Do you believe that the company making this technology makes decisions with the environmental impact of the technology in mind?", image: "images/environmental03.png" }
    ]
  }
];

// ── Helper: get question text from string or object ──────────
function qText(q){ return typeof q === 'string' ? q : q.text; }
function qImage(q){ return (typeof q === 'object' && q.image) ? q.image : null; }

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let username = '';
let currentView = 'theme-0';
// votes now track yes / no / neutral
let votes = {}, myVotes = {}, charts = {}, unsubs = [];
let db, fsSetDoc, fsDoc, fsOnSnapshot, isDemo = false;

SURVEY.forEach((_,ti)=>{
  votes[ti]={};myVotes[ti]={};
  SURVEY[ti].questions.forEach((_,qi)=>{ votes[ti][qi]={yes:0,no:0,neutral:0}; });
});

window.addEventListener('firebase-ready',()=>{
  db=window.db;fsSetDoc=window.fsSetDoc;fsDoc=window.fsDoc;fsOnSnapshot=window.fsOnSnapshot;
  window._fbReady=true;
});

function enterApp(){
  const v=document.getElementById('uname').value.trim();
  if(!v){showToast('Please enter your name');return;}
  username=v;
  document.getElementById('u-name').textContent=username;
  document.getElementById('u-init').textContent=username[0].toUpperCase();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  waitForFB();
}
document.getElementById('uname').addEventListener('keydown',e=>{if(e.key==='Enter')enterApp();});

function waitForFB(){
  if(window._fbReady){initApp();return;}
  setTimeout(waitForFB,80);
}

function initApp(){
  isDemo=!db;
  buildSidebar();
  showTheme(0);
  subscribeAll();
}

// ═══════════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════════
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`
    <div class="sidebar-label">Overview</div>
    <button class="sbtn" id="sum-btn" onclick="showSummary()">
      <span class="si">📊</span><span class="sn">Results</span>
    </button>
    <div class="sidebar-label" style="margin-top:.7rem">Themes</div>
  `;
  SURVEY.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='sbtn';btn.id=`tb-${i}`;
    btn.innerHTML=`<span class="si">${t.icon}</span><span class="sn">${t.theme}</span><span class="sp" id="sp-${i}">0/${t.questions.length}</span>`;
    btn.onclick=()=>showTheme(i);
    sb.appendChild(btn);
  });
}

function activateBtn(view){
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('theme-active','sum-active'));
  if(view==='summary'){document.getElementById('sum-btn')?.classList.add('sum-active');}
  else{document.getElementById(`tb-${parseInt(view.replace('theme-',''))}`)?.classList.add('theme-active');}
}

// ═══════════════════════════════════════════════════════════════
//  FIRESTORE
// ═══════════════════════════════════════════════════════════════
function subscribeAll(){
  if(isDemo)return;
  unsubs.forEach(u=>u());unsubs=[];
  SURVEY.forEach((_,ti)=>SURVEY[ti].questions.forEach((_,qi)=>{
    const u=fsOnSnapshot(fsDoc(db,'survey_responses',`t${ti}_q${qi}`),snap=>{
      if(snap.exists()){
        const d=snap.data();
        votes[ti][qi]={yes:d.yes||0,no:d.no||0,neutral:d.neutral||0};
      } else {
        votes[ti][qi]={yes:0,no:0,neutral:0};
      }
      syncUI(ti,qi);
    });
    unsubs.push(u);
  }));
}

function syncUI(ti,qi){
  if(currentView===`theme-${ti}`)updateBar(ti,qi);
  if(currentView==='summary'){syncSummaryChart(ti);syncOverall();}
  updateSP();
}

// ═══════════════════════════════════════════════════════════════
//  VOTE
// ═══════════════════════════════════════════════════════════════
async function castVote(ti,qi,choice){
  const prev=myVotes[ti][qi];
  if(prev===choice)return;
  const v=votes[ti][qi];
  if(prev)v[prev]=Math.max(0,v[prev]-1);
  v[choice]++;
  myVotes[ti][qi]=choice;
  refreshBtns(ti,qi);updateBar(ti,qi);updateSP();
  if(currentView==='summary'){syncSummaryChart(ti);syncOverall();}
  if(isDemo){showToast('Demo mode — add Firebase config to sync');return;}
  try{
    await fsSetDoc(fsDoc(db,'survey_responses',`t${ti}_q${qi}`),
      {[`users.${sk(username)}`]:choice,yes:v.yes,no:v.no,neutral:v.neutral},{merge:true});
  }catch(e){showToast('Sync error');console.error(e);}
}

function sk(n){return n.replace(/[^a-zA-Z0-9_-]/g,'_').substring(0,40);}

// ═══════════════════════════════════════════════════════════════
//  THEME PAGE
// ═══════════════════════════════════════════════════════════════
function showTheme(idx){
  currentView=`theme-${idx}`;activateBtn(currentView);destroyCharts();
  const t=SURVEY[idx];
  document.getElementById('main-content').innerHTML=`
    ${demoBanner()}
    <div class="pg-icon">${t.icon}</div>
    <div class="pg-title">${t.theme}</div>
    <div class="pg-sub">${t.questions.length} questions — results update <strong>live</strong></div>
    <div class="qgrid" id="qgrid"></div>
  `;
  const g=document.getElementById('qgrid');
  t.questions.forEach((_,qi)=>{
    const c=document.createElement('div');
    c.className='qcard';c.id=`qc-${idx}-${qi}`;
    c.innerHTML=cardHTML(idx,qi);
    g.appendChild(c);
    updateBar(idx,qi);
  });
}

function cardHTML(ti,qi){
  const entry=SURVEY[ti].questions[qi];
  const q=qText(entry);
  const img=qImage(entry);
  const mv=myVotes[ti][qi];
  const v=votes[ti][qi];
  const tot=v.yes+v.no+v.neutral;
  const yp=tot?Math.round(v.yes/tot*100):0;
  const np=tot?Math.round(v.no/tot*100):0;
  const nep=tot?Math.round(v.neutral/tot*100):0;

  const imgHTML=img
    ? `<img src="${img}" alt="Question image" class="qcard-img" onerror="this.style.display='none'">`
    : '';

  return `
    ${imgHTML}
    <div class="qcard-top"><div class="qtext">${q}</div><div class="qnum">Q${qi+1}</div></div>
    <div class="vbtns">
      <button class="vbtn yb${mv==='yes'?' voted':''}" onclick="castVote(${ti},${qi},'yes')">✓ Yes</button>
      <button class="vbtn nb${mv==='no'?' voted':''}" onclick="castVote(${ti},${qi},'no')">✗ No</button>
      <button class="vbtn neub${mv==='neutral'?' voted':''}" onclick="castVote(${ti},${qi},'neutral')">— N/A</button>
    </div>
    <div class="bar-area">
      <div class="brow"><div class="blbl y">YES</div><div class="btrack"><div class="bfill y" id="by-${ti}-${qi}" style="width:${yp}%"></div></div><div class="bcnt" id="cy-${ti}-${qi}">${v.yes}</div></div>
      <div class="brow"><div class="blbl n">NO</div><div class="btrack"><div class="bfill n" id="bn-${ti}-${qi}" style="width:${np}%"></div></div><div class="bcnt" id="cn-${ti}-${qi}">${v.no}</div></div>
      <div class="brow"><div class="blbl neu">N/A</div><div class="btrack"><div class="bfill neu" id="bne-${ti}-${qi}" style="width:${nep}%"></div></div><div class="bcnt" id="cne-${ti}-${qi}">${v.neutral}</div></div>
      <div class="qtot" id="qt-${ti}-${qi}">${tot===1?'1 response':tot+' responses'}</div>
    </div>`;
}

function refreshBtns(ti,qi){
  const card=document.getElementById(`qc-${ti}-${qi}`);if(!card)return;
  const mv=myVotes[ti][qi];
  card.querySelectorAll('.vbtn').forEach(b=>{
    b.classList.remove('voted');
    if((b.classList.contains('yb')&&mv==='yes')||
       (b.classList.contains('nb')&&mv==='no')||
       (b.classList.contains('neub')&&mv==='neutral'))b.classList.add('voted');
  });
}

function updateBar(ti,qi){
  const v=votes[ti][qi];
  const tot=v.yes+v.no+v.neutral;
  const yp=tot?Math.round(v.yes/tot*100):0;
  const np=tot?Math.round(v.no/tot*100):0;
  const nep=tot?Math.round(v.neutral/tot*100):0;
  const set=(id,val)=>{const e=document.getElementById(id);if(e)e.style?e.style.width=val+'%':e.textContent=val;};
  const setText=(id,val)=>{const e=document.getElementById(id);if(e)e.textContent=val;};
  set(`by-${ti}-${qi}`,yp);set(`bn-${ti}-${qi}`,np);set(`bne-${ti}-${qi}`,nep);
  setText(`cy-${ti}-${qi}`,v.yes);setText(`cn-${ti}-${qi}`,v.no);setText(`cne-${ti}-${qi}`,v.neutral);
  setText(`qt-${ti}-${qi}`,tot===1?'1 response':tot+' responses');
}

function updateSP(){
  SURVEY.forEach((_,ti)=>{
    let d=0;SURVEY[ti].questions.forEach((_,qi)=>{if(myVotes[ti][qi])d++;});
    const e=document.getElementById(`sp-${ti}`);if(e)e.textContent=`${d}/${SURVEY[ti].questions.length}`;
  });
}

// ═══════════════════════════════════════════════════════════════
//  SUMMARY PAGE
// ═══════════════════════════════════════════════════════════════
function showSummary(){
  currentView='summary';activateBtn('summary');destroyCharts();
  const totalQ=SURVEY.reduce((a,t)=>a+t.questions.length,0);
  document.getElementById('main-content').innerHTML=`
    ${demoBanner()}
    <div class="pg-title">📊 Results</div>
    <div class="pg-sub">Live aggregate of all responses across ${SURVEY.length} themes and ${totalQ} questions</div>
    <div class="overall-card" id="oc">
      <div class="oc-title">Overall Survey Results</div>
      <div class="oc-sub">Higher percentage of No answers could mean that the technology excludes diverse voices and it is not neutral. Your voice might not be represented in its design and deployment so it might be biased. Also, if you have a lot of Yes answers in the "User" section but Nos in all of the other sections, the technology could still be biased.</div>
      <div class="oc-stats" id="oc-stats"></div>
      <div class="chart-h240"><canvas id="chart-overall"></canvas></div>
    </div>
    <div id="theme-secs"></div>

function buildOverall(){
  renderOverallStats();
  const ctx=document.getElementById('chart-overall').getContext('2d');
  const ch=new Chart(ctx,{
    type:'bar',
    data:{
      labels:SURVEY.map(t=>t.theme),
      datasets:[
        {label:'YES', data:SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].yes,0)),     backgroundColor:'rgba(255,110,180,.75)',borderColor:'#ff6eb4',borderWidth:1.5,borderRadius:4},
        {label:'NO',  data:SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].no,0)),      backgroundColor:'rgba(139,26,58,.75)', borderColor:'#8b1a3a',borderWidth:1.5,borderRadius:4},
        {label:'N/A', data:SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].neutral,0)), backgroundColor:'rgba(176,96,144,.65)',borderColor:'#b06090',borderWidth:1.5,borderRadius:4}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#d48aaa',font:{family:"'DM Sans',sans-serif",size:12}}}},
      scales:{
        x:{ticks:{color:'#a06080',font:{size:10},maxRotation:35},grid:{color:'rgba(255,110,180,.06)'}},
        y:{ticks:{color:'#a06080',font:{size:11}},grid:{color:'rgba(255,110,180,.06)'},beginAtZero:true}
      }
    }
  });
  charts['overall']=ch;
}

function renderOverallStats(){
  const{ty,tn,tne,tt}=totals();
  const el=document.getElementById('oc-stats');if(!el)return;
  el.innerHTML=`
    <div class="ostat"><div class="ostat-num y">${ty}</div><div class="ostat-lbl">Total YES</div></div>
    <div class="ostat"><div class="ostat-num n">${tn}</div><div class="ostat-lbl">Total NO</div></div>
    <div class="ostat"><div class="ostat-num neu">${tne}</div><div class="ostat-lbl">Neutral/N/A</div></div>
    <div class="ostat"><div class="ostat-num t">${tt}</div><div class="ostat-lbl">Total Responses</div></div>
    <div class="ostat"><div class="ostat-num r">${tt?Math.round(ty/tt*100):0}%</div><div class="ostat-lbl">YES Rate</div></div>
  `;
}

function syncOverall(){
  const ch=charts['overall'];if(!ch)return;
  ch.data.datasets[0].data=SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].yes,0));
  ch.data.datasets[1].data=SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].no,0));
  ch.data.datasets[2].data=SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].neutral,0));
  ch.update('none');renderOverallStats();
}

function totals(){
  let ty=0,tn=0,tne=0;
  SURVEY.forEach((_,ti)=>SURVEY[ti].questions.forEach((_,qi)=>{
    ty+=votes[ti][qi].yes;tn+=votes[ti][qi].no;tne+=votes[ti][qi].neutral;
  }));
  return{ty,tn,tne,tt:ty+tn+tne};
}

function buildThemeSecs(){
  const cont=document.getElementById('theme-secs');cont.innerHTML='';
  SURVEY.forEach((t,ti)=>{
    const tot=t.questions.reduce((s,_,qi)=>s+votes[ti][qi].yes+votes[ti][qi].no+votes[ti][qi].neutral,0);
    const sec=document.createElement('div');sec.className='tss';sec.id=`tss-${ti}`;
    sec.innerHTML=`
      <div class="tss-hd">
        <span class="tss-ico">${t.icon}</span>
        <span class="tss-nm">${t.theme}</span>
        <span class="tss-tot" id="tss-tot-${ti}">${tot} response${tot!==1?'s':''}</span>
      </div>
      <div class="chart-h130"><canvas id="chart-t-${ti}"></canvas></div>
    `;
    cont.appendChild(sec);buildThemeChart(ti);
  });
}

function buildThemeChart(ti){
  const t=SURVEY[ti];
  const tips=t.questions.map(q=>{ const txt=qText(q); return txt.length>60?txt.substring(0,57)+'…':txt; });
  const ctx=document.getElementById(`chart-t-${ti}`).getContext('2d');
  const ch=new Chart(ctx,{
    type:'bar',
    data:{
      labels:t.questions.map((_,i)=>`Q${i+1}`),
      datasets:[
        {label:'YES', data:t.questions.map((_,qi)=>votes[ti][qi].yes),     backgroundColor:'rgba(255,110,180,.75)',borderColor:'#ff6eb4',borderWidth:1,borderRadius:3,stack:'s'},
        {label:'NO',  data:t.questions.map((_,qi)=>votes[ti][qi].no),      backgroundColor:'rgba(139,26,58,.75)', borderColor:'#8b1a3a',borderWidth:1,borderRadius:3,stack:'s'},
        {label:'N/A', data:t.questions.map((_,qi)=>votes[ti][qi].neutral),  backgroundColor:'rgba(176,96,144,.65)',borderColor:'#b06090',borderWidth:1,borderRadius:3,stack:'s'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:i=>`Q${i[0].dataIndex+1}: ${tips[i[0].dataIndex]}`,
          label:i=>`${i.dataset.label}: ${i.raw}`
        }}
      },
      scales:{
        x:{stacked:true,ticks:{color:'#a06080',font:{size:9}},grid:{color:'rgba(255,110,180,.04)'}},
        y:{stacked:true,ticks:{color:'#a06080',font:{size:10}},grid:{color:'rgba(255,110,180,.04)'},beginAtZero:true}
      }
    }
  });
  charts[`t${ti}`]=ch;
}

function syncSummaryChart(ti){
  const ch=charts[`t${ti}`];if(!ch)return;
  ch.data.datasets[0].data=SURVEY[ti].questions.map((_,qi)=>votes[ti][qi].yes);
  ch.data.datasets[1].data=SURVEY[ti].questions.map((_,qi)=>votes[ti][qi].no);
  ch.data.datasets[2].data=SURVEY[ti].questions.map((_,qi)=>votes[ti][qi].neutral);
  ch.update('none');
  const tot=SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].yes+votes[ti][qi].no+votes[ti][qi].neutral,0);
  const badge=document.getElementById(`tss-tot-${ti}`);
  if(badge)badge.textContent=`${tot} response${tot!==1?'s':''}`;
}

function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
}

function demoBanner(){
  return isDemo?`<div class="cfg show">⚠ <strong>Firebase not configured.</strong> Replace the <code>firebaseConfig</code> values at the top of this file to enable live multi-user sync.</div>`:'';
}

// ═══════════════════════════════════════════════════════════════
//  PDF EXPORT — programmatic rendering
// ═══════════════════════════════════════════════════════════════
async function exportPDF(){
  const btn=document.getElementById('pdf-btn');
  btn.disabled=true;
  document.getElementById('pdf-ov').classList.add('show');
  const msg=document.getElementById('pdf-msg');

  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210,PH=297,M=13,CW=PW-M*2;

  const sf=(size,style='normal',r=252,g=232,b=240)=>{pdf.setFontSize(size);pdf.setFont('helvetica',style);pdf.setTextColor(r,g,b);};
  const fr=(x,y,w,h,rad,R,G,B)=>{pdf.setFillColor(R,G,B);pdf.roundedRect(x,y,w,h,rad,rad,'F');};
  const frsh=(x,y,w,h,R,G,B)=>{pdf.setFillColor(R,G,B);pdf.rect(x,y,w,h,'F');};
  const newPage=()=>{pdf.addPage();frsh(0,0,PW,PH,26,8,16);};

  const drawBar3=(x,y,w,h,yesV,noV,neuV)=>{
    const tot=yesV+noV+neuV;
    fr(x,y,w,h,1,60,20,40);
    if(tot>0){
      const yw=w*(yesV/tot),nw=w*(noV/tot),new2=w*(neuV/tot);
      if(yw>0)fr(x,y,yw,h,1,255,110,180);
      if(nw>0)fr(x+yw,y,nw,h,1,139,26,58);
      if(new2>0)fr(x+yw+nw,y,new2,h,1,176,96,144);
    }
  };

  // ── COVER ────────────────────────────────────────────────────
  msg.textContent='Building cover page…';
  frsh(0,0,PW,PH,26,8,16);
  frsh(0,0,PW,4,255,110,180);
  sf(34,'bold',252,232,240);pdf.text('LivePulse',M,62);
  sf(15,'normal',255,110,180);pdf.text('Real-Time Survey Report',M,75);
  sf(9,'normal',160,96,128);pdf.text(`Generated: ${new Date().toLocaleString()}`,M,86);
  pdf.text(`Respondent: ${username}`,M,93);

  const{ty,tn,tne,tt}=totals();
  fr(M,108,CW,58,4,48,18,34);
  sf(8,'bold',160,96,128);
  pdf.text('TOTAL',M+6,121);pdf.text('YES',M+46,121);pdf.text('NO',M+88,121);pdf.text('NEUTRAL/N/A',M+124,121);pdf.text('YES RATE',M+172,121);
  sf(18,'bold',255,159,204);pdf.text(String(tt),M+6,135);
  sf(18,'bold',255,110,180);pdf.text(String(ty),M+46,135);
  sf(18,'bold',192,57,94);pdf.text(String(tn),M+88,135);
  sf(18,'bold',176,96,144);pdf.text(String(tne),M+124,135);
  sf(18,'bold',255,179,217);pdf.text(`${tt?Math.round(ty/tt*100):0}%`,M+172,135);
  sf(7,'normal',90,40,60);pdf.text(`${SURVEY.length} themes · ${SURVEY.reduce((a,t)=>a+t.questions.length,0)} questions`,M,176);

  // ── OVERALL CHART PAGE ───────────────────────────────────────
  msg.textContent='Building overall chart…';
  newPage();
  frsh(0,0,PW,4,255,110,180);
  sf(13,'bold',252,232,240);pdf.text('Overall Survey Results',M,18);
  sf(8,'normal',160,96,128);pdf.text('YES, NO, and Neutral/N/A totals per theme',M,24);

  const maxBarH=90,chartX=M+20,chartW=CW-24;
  const barSlotW=chartW/SURVEY.length;
  const yesData=SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].yes,0));
  const noData =SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].no,0));
  const neuData=SURVEY.map((_,ti)=>SURVEY[ti].questions.reduce((s,_,qi)=>s+votes[ti][qi].neutral,0));
  const maxVal=Math.max(...yesData.map((y,i)=>y+noData[i]+neuData[i]),1);
  const chartY=32;

  pdf.setDrawColor(90,31,58);pdf.setLineWidth(.3);
  pdf.line(chartX,chartY,chartX,chartY+maxBarH);
  pdf.line(chartX,chartY+maxBarH,chartX+chartW,chartY+maxBarH);

  SURVEY.forEach((t,i)=>{
    const groupW=barSlotW*.8,bw=groupW/3,bx=chartX+i*barSlotW+barSlotW*.1;
    const yH=yesData[i]/maxVal*maxBarH;
    const nH=noData[i]/maxVal*maxBarH;
    const neH=neuData[i]/maxVal*maxBarH;
    if(yH>0)fr(bx,chartY+maxBarH-yH,bw,yH,.6,255,110,180);
    if(nH>0)fr(bx+bw,chartY+maxBarH-nH,bw,nH,.6,139,26,58);
    if(neH>0)fr(bx+bw*2,chartY+maxBarH-neH,bw,neH,.6,176,96,144);
    sf(5.5,'normal',160,96,128);
    const lbl=t.theme.length>11?t.theme.substring(0,10)+'…':t.theme;
    pdf.text(lbl,chartX+i*barSlotW+barSlotW/2,chartY+maxBarH+5,{align:'center',maxWidth:barSlotW*.92});
  });

  // legend
  const ly=chartY+maxBarH+20;
  fr(M,ly,7,3.5,1,255,110,180);sf(7.5,'normal',255,110,180);pdf.text('YES',M+9,ly+3);
  fr(M+25,ly,7,3.5,1,139,26,58);sf(7.5,'normal',192,57,94);pdf.text('NO',M+34,ly+3);
  fr(M+50,ly,7,3.5,1,176,96,144);sf(7.5,'normal',176,96,144);pdf.text('Neutral/N/A',M+59,ly+3);

  // stats boxes
  const statsY=chartY+maxBarH+32;
  [{v:ty,lbl:'Total YES',R:255,G:110,B:180},{v:tn,lbl:'Total NO',R:192,G:57,B:94},
   {v:tne,lbl:'Neutral/N/A',R:176,G:96,B:144},{v:tt,lbl:'Responses',R:255,G:159,B:204},
   {v:`${tt?Math.round(ty/tt*100):0}%`,lbl:'YES Rate',R:255,G:179,B:217}
  ].forEach((s,i)=>{
    const cols=5,bw2=CW/cols-1.5,bx=M+i*(CW/cols)+.75;
    fr(bx,statsY,bw2,21,3,48,18,34);
    sf(13,'bold',s.R,s.G,s.B);pdf.text(String(s.v),bx+bw2/2,statsY+11,{align:'center'});
    sf(6.5,'normal',160,96,128);pdf.text(s.lbl,bx+bw2/2,statsY+18,{align:'center'});
  });

  // ── ONE PAGE PER THEME ───────────────────────────────────────
  for(let ti=0;ti<SURVEY.length;ti++){
    msg.textContent=`Building theme ${ti+1} of ${SURVEY.length}: ${SURVEY[ti].theme}…`;
    const t=SURVEY[ti];
    newPage();
    frsh(0,0,PW,4,255,110,180);

    sf(13,'bold',252,232,240);pdf.text(`${t.icon}  ${t.theme}`,M,18);
    sf(8,'normal',160,96,128);
    const thTot=t.questions.reduce((s,_,qi)=>s+votes[ti][qi].yes+votes[ti][qi].no+votes[ti][qi].neutral,0);
    pdf.text(`${t.questions.length} questions · ${thTot} total responses`,M,25);

    // Theme mini-chart
    const thChartY=30,thChartH=46,thChartX=M+14,thChartW=CW-16;
    const thBarSlotW=thChartW/t.questions.length;
    const thMax=Math.max(...t.questions.map((_,qi)=>votes[ti][qi].yes+votes[ti][qi].no+votes[ti][qi].neutral),1);
    pdf.setDrawColor(90,31,58);pdf.setLineWidth(.22);
    pdf.line(thChartX,thChartY,thChartX,thChartY+thChartH);
    pdf.line(thChartX,thChartY+thChartH,thChartX+thChartW,thChartY+thChartH);

    t.questions.forEach((_,qi)=>{
      const v=votes[ti][qi];
      const groupW=thBarSlotW*.78,bw=groupW/3;
      const bx=thChartX+qi*thBarSlotW+thBarSlotW*.11;
      const yH=v.yes/thMax*thChartH,nH=v.no/thMax*thChartH,neH=v.neutral/thMax*thChartH;
      if(yH>0)fr(bx,thChartY+thChartH-yH,bw,yH,.5,255,110,180);
      if(nH>0)fr(bx+bw,thChartY+thChartH-nH,bw,nH,.5,139,26,58);
      if(neH>0)fr(bx+bw*2,thChartY+thChartH-neH,bw,neH,.5,176,96,144);
      sf(5.5,'normal',160,96,128);pdf.text(`Q${qi+1}`,thChartX+qi*thBarSlotW+thBarSlotW/2,thChartY+thChartH+3.5,{align:'center'});
    });

    // Per-question list
    let y=thChartY+thChartH+11;
    sf(7.5,'bold',255,110,180);pdf.text('QUESTION-BY-QUESTION RESULTS',M,y);y+=5;

    for(let qi=0;qi<t.questions.length;qi++){
      const v=votes[ti][qi],tot=v.yes+v.no+v.neutral;
      const cardH=19;
      if(y+cardH>PH-10){newPage();frsh(0,0,PW,4,255,110,180);y=14;}

      fr(M,y,CW,cardH,2.5,48,18,34);
      fr(M+2.5,y+3,9,13,1.5,90,30,60);
      sf(7,'bold',255,110,180);pdf.text(`Q${qi+1}`,M+7,y+10.5,{align:'center'});

      sf(7.5,'normal',230,180,210);
      const qtxt=qText(t.questions[qi]);
      const qtxtShort=qtxt.length>72?qtxt.substring(0,69)+'…':qtxt;
      pdf.text(qtxtShort,M+14,y+7);

      const barX=M+14,barY2=y+11.5,barW3=CW-44,barH3=3.5;
      drawBar3(barX,barY2,barW3,barH3,v.yes,v.no,v.neutral);

      sf(6,'bold',255,110,180);pdf.text(`Y:${v.yes}`,M+CW-26,y+7);
      sf(6,'bold',192,57,94);pdf.text(`N:${v.no}`,M+CW-17,y+7);
      sf(6,'bold',176,96,144);pdf.text(`?:${v.neutral}`,M+CW-8,y+7);
      sf(5.5,'normal',160,96,128);
      const pct=tot?`${Math.round(v.yes/tot*100)}% yes`:'no votes';
      pdf.text(pct,M+CW-26,y+14);

      y+=cardH+2.5;
    }
  }

  msg.textContent='Saving…';
  pdf.save(`livepulse-report-${new Date().toISOString().slice(0,10)}.pdf`);
  document.getElementById('pdf-ov').classList.remove('show');
  btn.disabled=false;
  showToast('PDF saved ✓');
}

// ═══════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
